<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FAQ - Mehndi By Simra</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .btn-link {
            text-decoration: none !important;
            font-size: 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-link span {
            font-size: 1.5rem;
            margin-left: auto;
        }

        .btn-link:hover {
            text-decoration: none !important;
        }

        .card-body {
            font-size: 0.95rem;
            color: #fff;
        }

        .typing {
            font-size: 2rem;
            text-align: center;
            margin: 0 auto;
            display: block;
        }

        .typing::after {
            content: none !important;
            animation: none !important;
        }

        @media (max-width: 768px) {
            .btn-link {
                font-size: 1rem;
                padding: 0.75rem 1rem;
            }

            .typing {
                font-size: 1.25rem;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <div id="main-wrapper" class="background-wrapper">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light" onmouseenter="pauseBackground()" onmouseleave="resumeBackground()">
            <a class="navbar-brand" href="index.html">
                <img src="images/logo.png" alt="Mehndi By Simra Logo" style="height: 100px" class="glow-logo">
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link text-light" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light" href="aboutUs.html">Portfolio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- FAQ Section -->
        <section class="container mt-5 mb-5">
            <div class="intro-wrapper">
                <h2 class="typing" style="color: #ffcc70;">Frequently Asked Questions</h2>
                <div class="accordion" id="faqAccordion"></div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="text-center py-4 text-light" onmouseenter="pauseBackground()" onmouseleave="resumeBackground()">
            <p style="color: beige">
                &copy; 2025
                <a href="https://www.instagram.com/mehndibysimra" class="no-style-link">Mehndi By Simra</a>. All rights reserved.
            </p>
        </footer>
    </div>

    <!-- Background animation control -->
    <script>
        function pauseBackground() {
            if (window.innerWidth > 768) {
                document.getElementById("main-wrapper").classList.add("paused");
            }
        }

        function resumeBackground() {
            if (window.innerWidth > 768) {
                document.getElementById("main-wrapper").classList.remove("paused");
            }
        }

        const faqs = [
            { q: "What is the difference between natural and black henna?", a: "Natural henna is made from the dried leaves of the Lawsonia inermis plant and gives a reddish-brown stain that darkens over time. Black henna, on the other hand, often contains chemicals such as PPD (para-phenylenediamine), which can cause severe allergic reactions, blistering, and long-term skin damage. At Mehndi By Simra, we strictly use natural, chemical-free henna to ensure client safety and comfort." },
            { q: "What should I do if I have very dry or oily skin?", a: "If you have dry skin, we recommend moisturizing with a natural oil like coconut or almond oil leading up to your mehndi appointment (but not on the day of application). For oily skin, cleanse thoroughly and avoid using lotions or oils on the day of application as they can prevent the henna from adhering properly and affect stain quality. Post-application, both skin types should avoid soap and water for 24 hours for best results." },
            { q: "Can I book a mehndi appointment if I have eczema or sensitive skin?", a: "Yes, but we strongly advise doing a patch test at least 48 hours before the full application. While our henna is natural and free of harsh chemicals, individuals with eczema or highly sensitive skin may still react to plant-based products. Let us know in advance so we can tailor our application to avoid affected areas or use extra caution." },
            { q: "Is it safe to get henna while pregnant?", a: "Natural henna is generally considered safe during pregnancy when applied externally. We take extra care to ensure all ingredients used are 100% natural and free from essential oils that are not pregnancy-safe. We’ve had many expectant mothers choose henna for baby showers or maternity shoots—just inform us beforehand so we can use the most gentle formulation possible." },
            { q: "Can you match mehndi designs to my bridal outfit or cultural theme?", a: "Absolutely. During the consultation, we encourage clients to share outfit photos, fabric swatches, cultural inspirations, or Pinterest boards. We can incorporate paisleys, mandalas, florals, or cultural symbols (like Mughal motifs or South Indian patterns) to beautifully complement your attire and overall aesthetic." },
            { q: "How do you ensure hygiene and cleanliness during the application?", a: "We follow strict hygiene protocols. All cones are freshly prepared in a sanitized environment, and single-use tissues and gloves are used where necessary. We sanitize our hands and surfaces before and during sessions. If the event involves multiple clients, we ensure each person receives clean, separate care without cross-contamination." },
            { q: "Can you work around tight schedules or last-minute bookings?", a: "We understand that sometimes bookings happen close to the event date due to unexpected changes. While we recommend booking in advance to guarantee availability, we do accept last-minute appointments if our schedule permits. We'll work with you to prioritize timing, design simplicity, and efficient application without compromising on quality. Weekday bookings have better last-minute flexibility than weekends or peak wedding season." },
            { q: "How do you handle large bookings or back-to-back events?", a: "For large events or multiple-day functions, we coordinate in advance to build a tailored schedule. Depending on the guest count, we may bring an assistant artist to maintain quality and timing. We also allocate buffer time to ensure no one is rushed and all guests receive a beautiful, complete design." },
            { q: "Do you provide aftercare instructions, and why are they important?", a: "Yes! Every client receives a detailed aftercare guide. Aftercare is crucial to ensure the deepest stain and long-lasting results. It includes tips like avoiding water and soaps for the first 24 hours, applying natural oils for protection, and keeping the area warm to accelerate stain oxidation. Following our aftercare boosts the stain from orange to deep maroon over 48 hours." },
            { q: "What happens if my event gets delayed or runs late?", a: "If your event runs behind schedule, we do our best to accommodate within reason. However, delays beyond 30 minutes may incur additional charges depending on the day's schedule. To avoid disruption, we recommend assigning someone to manage time slots if multiple guests are being served. We are always understanding, but fairness to other clients is also important." }
        ];

        const container = document.getElementById("faqAccordion");
        faqs.forEach((faq, index) => {
            const card = document.createElement("div");
            card.className = "card bg-transparent border-0";

            const header = document.createElement("div");
            header.className = "card-header bg-transparent border-0 p-0";
            header.innerHTML = `
                <h5 class="mb-0">
                    <button class="btn btn-link text-light w-100 text-left d-flex justify-content-between align-items-center" type="button" data-toggle="collapse" data-target="#faq${index}" aria-expanded="false" aria-controls="faq${index}">
                        ${faq.q}<span>+</span>
                    </button>
                </h5>`;

            const collapse = document.createElement("div");
            collapse.className = "collapse";
            collapse.id = `faq${index}`;
            collapse.setAttribute("data-parent", "#faqAccordion");
            collapse.innerHTML = `<div class="card-body">${faq.a}</div>`;

            card.appendChild(header);
            card.appendChild(collapse);
            container.appendChild(card);
        });
    </script>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
