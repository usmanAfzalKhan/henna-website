<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact - Mehndi By Simra</title>

    <!-- Bootstrap CSS -->
    <link
      href="node_modules/bootstrap/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
      @keyframes backgroundMove {
        from {
          background-position: 0 0;
        }
        to {
          background-position: 1000px 1000px;
        }
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #f4f4f4;
      }
      .background-wrapper {
        background-color: #0b3d2e;
        background-image: url("images/background.png");
        background-size: 300px 300px;
        background-repeat: repeat;
        animation: backgroundMove 120s linear infinite;
      }
      .background-wrapper.paused {
        animation-play-state: paused !important;
      }
      nav.paused {
        animation-play-state: paused !important;
      }
      nav {
        background-image: url("images/background.png");
        background-size: 300px 300px;
        background-repeat: repeat;
        animation: backgroundMove 120s linear infinite;
        border-bottom: 3px solid #7b3f00;
        box-shadow: 0 0 10px #7b3f00;
      }
      .intro-wrapper {
        background-color: rgba(0, 0, 0, 0.3);
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
        padding: 40px;
        margin-bottom: 30px;
      }
      form {
        padding: 30px;
        border-radius: 8px;
        background-color: transparent;
        color: #f4f4f4;
      }
      .form-group label {
        font-weight: 600;
        margin-bottom: 8px;
      }
      .form-control {
        margin-bottom: 20px;
      }
      footer {
        color: #f4f4f4;
      }
      @media (max-width: 991.98px) {
        .navbar-collapse {
          position: fixed;
          top: 0;
          right: -250px;
          width: 250px;
          height: 100vh;
          background-color: rgba(11, 61, 46, 0.97);
          border-left: 2px solid #7b3f00;
          padding-top: 80px;
          transition: right 0.3s ease-in-out;
          z-index: 1050;
        }
        .navbar-collapse.show {
          right: 0;
        }
        .navbar-close {
          position: absolute;
          top: 15px;
          right: 20px;
          font-size: 30px;
          color: #fff;
          cursor: pointer;
          z-index: 1060;
          background: none;
          border: none;
        }
        .navbar-close:hover {
          color: #ffcc70;
        }
      }
    </style>
  </head>
  <body>
    <div class="background-wrapper" id="main-wrapper">
      <!-- Navbar -->
      <nav
        class="navbar navbar-expand-lg navbar-light"
        onmouseenter="pauseBackground(); this.classList.add('paused')"
        onmouseleave="resumeBackground(); this.classList.remove('paused')"
      >
        <a class="navbar-brand" href="index.html">
          <img
            src="images/logo.png"
            alt="Mehndi By Simra Logo"
            style="height: 125px"
          />
        </a>
        <button class="navbar-toggler" type="button">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <button
            class="navbar-close d-lg-none"
            onclick="document.getElementById('navbarNav').classList.remove('show')"
          >
            &times;
          </button>
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link text-light" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-light" href="aboutUs.html">Portfolio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-light" href="faq.html">FAQ</a>
            </li>
          </ul>
        </div>
      </nav>

      <!-- Contact Section -->
      <section class="container mt-5 mb-5">
        <div class="intro-wrapper">
          <h2 class="text-center">Contact Us</h2>
          <p class="text-center text-light">
            For inquiries, reach out via Instagram
            <a
              href="https://www.instagram.com/mehndibysimra"
              target="_blank"
              class="text-warning"
              >@mehndibysimra</a
            >
            or complete the form below.
          </p>
          <form
            id="contactForm"
            action="https://formspree.io/f/xwpovneg"
            method="POST"
          >
            <div class="form-group">
              <label for="name"
                >Full Name <span class="text-danger">*</span></label
              >
              <input
                type="text"
                class="form-control"
                id="name"
                name="name"
                placeholder="Your full name"
                required
                maxlength="50"
              />
            </div>
            <div class="form-group">
              <label for="phone"
                >Phone Number <span class="text-danger">*</span></label
              >
              <input
                type="tel"
                class="form-control"
                id="phone"
                name="phone"
                placeholder="Enter your phone #"
                required
              />
              <small
                id="phoneError"
                class="form-text text-danger"
                style="display: none"
                >Please enter a valid phone number.</small
              >
            </div>
            <div class="form-group">
              <label for="type"
                >Type of Event <span class="text-danger">*</span></label
              >
              <select class="form-control" id="type" name="type" required>
                <option value="">Select an option</option>
                <option value="Bridal">Bridal</option>
                <option value="Party">Party</option>
                <option value="Festival">Festival</option>
              </select>
            </div>
            <div class="form-group">
              <label for="people"
                >Number of People <span class="text-danger">*</span></label
              >
              <input
                type="number"
                class="form-control"
                id="people"
                name="people"
                min="1"
                step="1"
                placeholder="How many people?"
                required
                max="500"
              />
            </div>
            <div class="form-group">
              <label for="message">Your Message (Optional)</label>
              <textarea
                class="form-control"
                id="message"
                name="message"
                rows="4"
                maxlength="500"
                placeholder="Type any message you want to send..."
              ></textarea>
            </div>
            <button type="submit" class="btn btn-primary mt-3" id="submitBtn">
              Send Message
            </button>
          </form>
          <div
            id="formSuccess"
            class="alert alert-success mt-3"
            style="display: none"
          >
            Simra has been notified of your request.
          </div>
        </div>
      </section>

      <!-- Footer -->
      <footer
        class="text-center py-4 text-light"
        onmouseenter="pauseBackground()"
        onmouseleave="resumeBackground()"
      >
        <p>&copy; 2025 Mehndi By Simra. All rights reserved.</p>
      </footer>
    </div>

    <!-- Scripts -->
    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js"></script>
    <script>
      function pauseBackground() {
        document.getElementById("main-wrapper").classList.add("paused");
      }
      function resumeBackground() {
        document.getElementById("main-wrapper").classList.remove("paused");
      }

      document.addEventListener("DOMContentLoaded", function () {
        const toggler = document.querySelector(".navbar-toggler");
        const collapse = document.getElementById("navbarNav");
        toggler.addEventListener("click", function () {
          collapse.classList.toggle("show");
        });

        const phoneInput = document.querySelector("#phone");
        const iti = window.intlTelInput(phoneInput, {
          initialCountry: "ca",
          separateDialCode: true,
          preferredCountries: ["ca", "us", "gb", "in", "pk", "ae"],
          utilsScript:
            "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js",
        });

        phoneInput.addEventListener("input", () => {
          const isValid = iti.isValidNumber();
          const error = document.getElementById("phoneError");
          if (!isValid) {
            phoneInput.classList.add("is-invalid");
            error.style.display = "block";
          } else {
            phoneInput.classList.remove("is-invalid");
            error.style.display = "none";
          }
        });

        // Prevent decimal input in "Number of People"
        const peopleInput = document.getElementById("people");
        peopleInput.addEventListener("input", function () {
          this.value = this.value.replace(/[^\d]/g, "");
        });

        const form = document.getElementById("contactForm");
        const formSuccess = document.getElementById("formSuccess");

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          const formData = new FormData(form);
          fetch(form.action, {
            method: "POST",
            body: formData,
            headers: { Accept: "application/json" },
          })
            .then((response) => {
              if (response.ok) {
                formSuccess.style.display = "block";
                const inputs = form.querySelectorAll(
                  "input, textarea, select, button"
                );
                inputs.forEach((input) => (input.disabled = true));
              } else {
                alert(
                  "There was an issue submitting the form. Please try again later."
                );
              }
            })
            .catch(() => {
              alert("There was a connection issue. Please try again later.");
            });
        });
      });
    </script>
  </body>
</html>
