<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home - Mehndi By Simra</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="main-wrapper" class="background-wrapper">
      <!-- Navbar -->
      <nav
        class="navbar navbar-expand-lg navbar-light"
        onmouseenter="pauseBackground()"
        onmouseleave="resumeBackground()"
      >
      <a class="navbar-brand" href="index.html">
        <img
        src="images/logo.png"
        alt="Mehndi By Simra Logo"
        style="height: 100px"
        class="glow-logo"
      />
      
      
      </a>
      
        <button
          class="navbar-toggler"
          type="button"
          data-toggle="collapse"
          data-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link text-light" href="aboutUs.html">Portfolio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-light" href="faq.html">FAQ</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-light" href="contact.html">Contact</a>
            </li>
          </ul>
        </div>
      </nav>

      <!-- Hero Section -->
      <section class="hero"></section>

      <!-- Introduction Section -->
      <section
        id="intro"
        class="container mt-5"
        onmouseenter="pauseBackground()"
        onmouseleave="resumeBackground()"
      >
        <div class="intro-wrapper">
          <h2 style="color: #ffcc70; text-align: center">Introduction</h2>
          <p id="typed-paragraph" style="color: #f8f9fa; font-size: 1.1rem;"></p>
        </div>
      </section>

      <!-- Footer -->
      <footer
        class="text-center py-4 text-light"
        onmouseenter="pauseBackground()"
        onmouseleave="resumeBackground()"
      >
        <p style="color: beige">
          &copy; 2025
          <a
            href="https://www.instagram.com/mehndibysimra"
            class="no-style-link"
          >
            Mehndi By Simra</a
          >. All rights reserved.
        </p>
      </footer>
    </div>

    <!-- Background animation control -->
    <script>
      function pauseBackground() {
        document.getElementById("main-wrapper").classList.add("paused");
      }

      function resumeBackground() {
        document.getElementById("main-wrapper").classList.remove("paused");
      }
    </script>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
