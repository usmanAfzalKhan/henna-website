  <body>

        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link text-light" href="index.html">Home</a>
            </li>
            <li class="nav-item">

      <!-- Intro Section -->

        </div>
      </section>
      <section id="designs" class="container mt-5">
        <div class="intro-wrapper">
          <h3 style="text-align: center; color: #ffcc70">Designs</h3>
          <div class="row mt-4">
            <div class="col-md-4">
              <div class="card">
                <img src="images/bridal1.jpeg" class="card-img-top" alt="Bridal" data-toggle="modal" data-target="#lightboxModal" data-section="bridal" />
                <div class="card-body" style="background-color: #0b3d2e; text-align: center;">
                  <p class="card-text" style="color: #ffcc70; font-weight: bold;">Bridal Mehndi</p>
                </div>
              </div>
            </div>
            <div class="col-md-4">
              <div class="card">
                <img src="images/festive1.jpeg" class="card-img-top" alt="Festive" data-toggle="modal" data-target="#lightboxModal" data-section="festive" />
                <div class="card-body" style="background-color: #0b3d2e; text-align: center;">
                  <p class="card-text" style="color: #ffcc70; font-weight: bold;">Festival Mehndi</p>
                </div>
              </div>
            </div>
            <div class="col-md-4">
              <div class="card">

                <div class="card-body" style="background-color: #0b3d2e; text-align: center;">

      <!-- Reviews -->
      <section id="reviews" class="container mt-5">
        <div class="intro-wrapper">
          <h2 style="text-align: center; color: #ffcc70">What Our Clients Say</h2>

        </div>
      </section>

      <!-- Modal -->
      <div class="modal fade" id="lightboxModal" tabindex="-1" role="dialog" aria-labelledby="lightboxModalLabel" aria-hidden="true">

          <div class="modal-content">
            <div class="modal-header border-0">
              <h5 class="modal-title text-light" id="lightboxModalLabel"></h5>
              <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                <span aria-hidden="true">&times;</span>
              </button>
            </div>
            <div class="modal-body text-center" id="lightboxContent"></div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <footer class="text-center py-4 text-light">
        <p style="color: beige">
          &copy; 2025 <a href="https://www.instagram.com/mehndibysimra" class="no-style-link">Mehndi By Simra</a>. All rights reserved.
        </p>
      </footer>
    </div>

    <!-- External Script Includes Albums and Reviews -->
    <script src="script.js"></script>

    <script>

        },
        {
          name: "Hina Siddiqui",
          text: "Absolutely loved the work! 💕 The stain lasted for so long and the design was exactly how I wanted it. Simra is professional and so talented.",
        },
        {
          name: "Anum Farooq",
          text: "Such an elegant experience! From consultation to application, it was seamless. The mehndi turned out beautiful and dark.",
        },
        {
          name: "Rabia Khan",
          text: "Simra's mehndi added a magical touch to my sister’s wedding. The design was so neat and symmetrical. Thank you for the lovely work!",
        },
        {
          name: "Fariha Iqbal",
          text: "I was so impressed with the creativity and patience. Simra really took her time and the final result was breathtaking!",
        },
        {
          name: "Sana Javed",
          text: "Booked for Eid and everyone in the family loved the designs! 🌙 The stain developed beautifully too. Definitely booking again.",
        },
        {
          name: "Mehwish Chaudhry",
          text: "My go-to for all events now. The professionalism, hygiene, and skill are unmatched. Couldn’t be happier with the results.",
        },
        {
          name: "Amna Sheikh",
          text: "Loved every part of the experience 💫 From start to finish, Simra was kind and professional. My design was a hit at the party!",
        },
        {
          name: "Nida Tariq",
          text: "Simra is truly an artist. Her attention to detail and ability to customize exactly what I wanted made all the difference!",
        },
      ];
    
      const reviewContainer = document.getElementById("client-photos");
    
      reviews.forEach((review) => {
        const col = document.createElement("div");
        col.className = "col-md-4 mb-3";
    
        col.innerHTML = `
          <div class="card text-light p-3 h-100" style="background-color: rgba(0, 0, 0, 0.3);">
            <p class="card-text">${review.text}</p>
            <p class="text-light font-weight-bold mb-0">– ${review.name}</p>
          </div>

        reviewContainer.appendChild(col);

    </script>
    

    <script>
      const albums = {
        bridal: [
          "images/bridal1.jpeg",
          "images/bridal2.jpeg",
          "images/bridal3.jpeg",
          { type: "video", src: "images/bridal6.mp4" },
          "images/bridal4.jpeg",
          { type: "video", src: "images/bridal8.mp4" },
          "images/bridal5.jpeg",
          { type: "video", src: "images/bridal9.mp4" },
          { type: "video", src: "images/bridal10.mp4" }
        ],
        party: [
          "images/party1.jpeg",
          "images/party2.jpeg",
          { type: "video", src: "images/party7.mp4" },
          "images/party3.jpeg",
          "images/party4.jpeg",
          { type: "video", src: "images/party8.mp4" },
          "images/party5.jpeg",
          "images/party6.jpeg"
        ],
        festive: [
          "images/festive1.jpeg",
          "images/festive2.jpeg",
          { type: "video", src: "images/festive8.mp4" },
          "images/festive3.jpeg",
          { type: "video", src: "images/festive10.mp4" },
          "images/festive4.jpeg",
          "images/festive5.jpeg",
          "images/festive6.jpeg",
          "images/festive7.jpeg",
          "images/festive9.jpeg"
        ]
      };

      const titles = {
        bridal: "Bridal Mehndi Designs",
        party: "Party Mehndi Designs",
        festive: "Festive Mehndi Designs"
      };

      let currentAlbum = [],
          currentIndex = 0;

      function updateModalContent() {
        const item = currentAlbum[currentIndex];
        const content = typeof item === "string"
          ? `<img src="${item}" class="img-fluid" alt="Mehndi Design">`
          : `<video controls autoplay muted playsinline preload="auto" class="img-fluid"><source src="${item.src}" type="video/mp4"></video>`;

        $("#lightboxContent").html(content);
      }

      $("[data-toggle='modal']").on("click", function () {
        const section = $(this).data("section");
        currentAlbum = albums[section];
        currentIndex = 0;
        $("#lightboxModalLabel").text(titles[section]);
        updateModalContent();
      });

      $(document).on("keydown", function (e) {
        if ($("#lightboxModal").hasClass("show")) {
          if (e.key === "ArrowRight") {
            currentIndex = (currentIndex + 1) % currentAlbum.length;
            updateModalContent();
          } else if (e.key === "ArrowLeft") {
            currentIndex = (currentIndex - 1 + currentAlbum.length) % currentAlbum.length;
            updateModalContent();
          }
        }
      });

      let touchStartX = null, touchEndX = null;
      $("#lightboxModal").on("touchstart", function (e) {
        touchStartX = e.originalEvent.changedTouches[0].screenX;
      });
      $("#lightboxModal").on("touchend", function (e) {
        touchEndX = e.originalEvent.changedTouches[0].screenX;
        if (touchStartX && touchEndX) {
          const diff = touchStartX - touchEndX;
          if (Math.abs(diff) > 50) {
            currentIndex = diff > 0
              ? (currentIndex + 1) % currentAlbum.length
              : (currentIndex - 1 + currentAlbum.length) % currentAlbum.length;
            updateModalContent();
          }
        }
        touchStartX = null;
        touchEndX = null;
      });
    </script>
  </body>
</html>
